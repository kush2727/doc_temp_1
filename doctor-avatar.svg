<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d2691e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="rgba(0, 212, 255, 0.1)" stroke="rgba(0, 212, 255, 0.3)" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M 60 80 Q 60 40 100 40 Q 140 40 140 80" fill="url(#hairGradient)"/>
  
  <!-- Head -->
  <circle cx="100" cy="110" r="45" fill="url(#skinGradient)"/>
  
  <!-- Ears -->
  <ellipse cx="55" cy="110" rx="12" ry="20" fill="url(#skinGradient)"/>
  <ellipse cx="145" cy="110" rx="12" ry="20" fill="url(#skinGradient)"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="100" r="6" fill="#ffffff"/>
  <circle cx="115" cy="100" r="6" fill="#ffffff"/>
  <circle cx="85" cy="100" r="3" fill="#000000"/>
  <circle cx="115" cy="100" r="3" fill="#000000"/>
  
  <!-- Eyebrows -->
  <path d="M 78 92 Q 85 88 92 92" stroke="#2c1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 108 92 Q 115 88 122 92" stroke="#2c1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 100 100 L 100 115" stroke="#d2691e" stroke-width="2" fill="none"/>
  
  <!-- Mouth -->
  <path d="M 90 125 Q 100 132 110 125" stroke="#c85a54" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Medical coat -->
  <path d="M 60 155 L 60 180 L 140 180 L 140 155 Q 100 150 60 155" fill="rgba(255, 255, 255, 0.9)" stroke="rgba(0, 212, 255, 0.5)" stroke-width="2"/>
  
  <!-- Stethoscope -->
  <path d="M 75 160 Q 85 155 95 160 Q 105 165 115 160" stroke="rgba(0, 212, 255, 0.7)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Glow effect -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="rgba(0, 212, 255, 0.2)" stroke-width="1" opacity="0.5"/>
</svg>
