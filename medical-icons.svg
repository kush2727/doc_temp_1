<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- HEART ICON -->
  <g id="heart" transform="translate(50, 50)">
    <defs>
      <filter id="glow1">
        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <path d="M 50 90 C 20 70 0 50 0 35 C 0 20 10 10 20 10 C 30 10 40 20 50 30 C 60 20 70 10 80 10 C 90 10 100 20 100 35 C 100 50 80 70 50 90 Z" 
          fill="url(#neonGradient)" filter="url(#glow1)" opacity="0.8"/>
  </g>

  <!-- DNA HELIX -->
  <g id="dna" transform="translate(150, 50)">
    <defs>
      <filter id="glow2">
        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <!-- Left strand -->
    <path d="M 30 10 Q 40 30 30 50 Q 20 70 30 90" stroke="url(#neonGradient)" stroke-width="3" fill="none" filter="url(#glow2)"/>
    <!-- Right strand -->
    <path d="M 70 10 Q 60 30 70 50 Q 80 70 70 90" stroke="url(#neonGradient)" stroke-width="3" fill="none" filter="url(#glow2)"/>
    <!-- Connecting rungs -->
    <line x1="30" y1="20" x2="70" y2="20" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow2)"/>
    <line x1="28" y1="35" x2="72" y2="35" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow2)"/>
    <line x1="25" y1="50" x2="75" y2="50" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow2)"/>
    <line x1="28" y1="65" x2="72" y2="65" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow2)"/>
    <line x1="30" y1="80" x2="70" y2="80" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow2)"/>
  </g>

  <!-- MICROSCOPE -->
  <g id="microscope" transform="translate(250, 50)">
    <defs>
      <filter id="glow3">
        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <!-- Base -->
    <rect x="35" y="70" width="30" height="20" fill="url(#neonGradient)" filter="url(#glow3)"/>
    <!-- Arm -->
    <path d="M 50 70 L 50 30" stroke="url(#neonGradient)" stroke-width="3" fill="none" filter="url(#glow3)"/>
    <!-- Head -->
    <circle cx="50" cy="20" r="12" fill="url(#neonGradient)" filter="url(#glow3)"/>
    <!-- Eyepiece -->
    <circle cx="50" cy="10" r="6" fill="none" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow3)"/>
    <!-- Objective lens -->
    <circle cx="50" cy="35" r="8" fill="none" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow3)"/>
  </g>

  <!-- PILL/CAPSULE -->
  <g id="pill" transform="translate(50, 150)">
    <defs>
      <filter id="glow4">
        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <ellipse cx="50" cy="50" rx="35" ry="20" fill="url(#neonGradient)" filter="url(#glow4)" opacity="0.8"/>
    <line x1="50" y1="30" x2="50" y2="70" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  </g>

  <!-- PULSE/HEARTBEAT -->
  <g id="pulse" transform="translate(150, 150)">
    <defs>
      <filter id="glow5">
        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <polyline points="10,50 25,50 30,35 35,65 40,45 50,50 60,50 70,30 80,70 90,50" 
              stroke="url(#neonGradient)" stroke-width="3" fill="none" filter="url(#glow5)" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- SHIELD/PROTECTION -->
  <g id="shield" transform="translate(250, 150)">
    <defs>
      <filter id="glow6">
        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <path d="M 50 15 L 30 30 L 30 60 Q 50 80 50 80 Q 70 80 70 60 L 70 30 Z" 
          fill="none" stroke="url(#neonGradient)" stroke-width="3" filter="url(#glow6)"/>
    <circle cx="50" cy="50" r="8" fill="url(#neonGradient)" filter="url(#glow6)"/>
  </g>

  <!-- STETHOSCOPE -->
  <g id="stethoscope" transform="translate(50, 250)">
    <defs>
      <filter id="glow7">
        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <!-- Earpieces -->
    <circle cx="35" cy="20" r="5" fill="url(#neonGradient)" filter="url(#glow7)"/>
    <circle cx="65" cy="20" r="5" fill="url(#neonGradient)" filter="url(#glow7)"/>
    <!-- Tubes -->
    <path d="M 35 25 Q 35 40 50 50" stroke="url(#neonGradient)" stroke-width="3" fill="none" filter="url(#glow7)" stroke-linecap="round"/>
    <path d="M 65 25 Q 65 40 50 50" stroke="url(#neonGradient)" stroke-width="3" fill="none" filter="url(#glow7)" stroke-linecap="round"/>
    <!-- Diaphragm -->
    <circle cx="50" cy="70" r="15" fill="none" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow7)"/>
    <circle cx="50" cy="70" r="10" fill="url(#neonGradient)" filter="url(#glow7)" opacity="0.5"/>
  </g>

  <!-- BRAIN/NEUROLOGY -->
  <g id="brain" transform="translate(150, 250)">
    <defs>
      <filter id="glow8">
        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <path d="M 30 50 Q 30 30 50 20 Q 70 30 70 50 Q 70 70 50 80 Q 30 70 30 50" 
          fill="url(#neonGradient)" filter="url(#glow8)" opacity="0.7"/>
    <path d="M 35 45 Q 35 35 50 28 Q 65 35 65 45" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <path d="M 40 55 Q 40 48 50 45 Q 60 48 60 55" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  </g>

  <!-- MEDICAL CROSS -->
  <g id="cross" transform="translate(250, 250)">
    <defs>
      <filter id="glow9">
        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <rect x="40" y="20" width="20" height="60" fill="url(#neonGradient)" filter="url(#glow9)"/>
    <rect x="20" y="40" width="60" height="20" fill="url(#neonGradient)" filter="url(#glow9)"/>
  </g>
</svg>
